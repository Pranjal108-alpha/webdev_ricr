<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Pizza Order Form</h2>

    <form>
        First Name: <input type="text"><br><br>
        Last Name: <input type="text"><br><br>
        Email:<input type="email"><br><br>
        Contact Number : <input type="text"><br><br>
        Delivery Date: <input type="date"><br><br>

        Size:
        <input type="radio" name="size"> Small
         <input type="radio" name="size"> Medium
          <input type="radio" name="size"> Large
        <br><br>

        Flavor:<br>
        <input type="checkbox"> Hawaiian<br>
        <input type="checkbox"> Pepperoni<br>
        <input type="checkbox"> Vegetable<br><br>

        Credit Card Number: <input type="text"><br><br>
        PIN: <input type="password"><br><br>

        Additional Note:<br>
        <textarea rows="4" cols="40"></textarea><br><br>

        <input type="submit" value="Submit Order">
        </form>
</body>
</html>
