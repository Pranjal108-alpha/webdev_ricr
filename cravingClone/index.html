<!DOCTYPE html>
<html>
<head>
  <title>Cravings</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>



<section class="hero" style="background:url('WhatsApp Image 2026-04-18 at 1.08.04 AM.jpeg') center/cover;">
  <div class="container hero-content">
    <h1 class="fw-bold text-dark">Your Favorite Food, Delivered Fast</h1>
    <p class="mb-4">Order from thousands of restaurants</p>

    <a href="register.html" class="btn btn-primary-custom me-2">Sign Up</a>
    <a href="order-now.html" class="btn btn-light">Order Now</a>

    <div class="search-bar mt-4">
      <input class="form-control form-control-lg rounded-pill"
      placeholder="Search restaurants or dishes...">
    </div>
  </div>
</section>

<div class="container py-5">
  <h2 class="mb-4">Featured Restaurants</h2>

  <div class="row g-4">
    <div class="col-md-4">
      <div class="card">
        <img src="image.png">
        <div class="card-body">
          <h5 class="fw-bold">Pizza Palace</h5>
          <p class="text-muted small">Italian, Fast Food</p>
          <p class="small">⭐ 4.5 · 120 reviews</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
