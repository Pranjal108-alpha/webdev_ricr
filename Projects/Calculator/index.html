  <head>

    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"

    <link

      rel="stylesheet"

  <body>
    <div class="d-flex justify-content-center">
      <span><img src="CalculatorBGImage.png" /></span>

      <div
        class="w-25 bg-light border rounded-3 shadow mt-5 p-4 position-absolute">
       <div id="diplay" class="w-100 border rounded-3 bottom-0 p-5 bg-success-subtle">

       </div>
       <div class="p-5 bg-danger-subtle">
        <button class="border rounded-circle m-lg-2">AC</button> 
        <button class="border rounded-circle m-lg-2">C</button>
        <button class="border rounded-circle m-lg-2">%</button>
        <button class="border rounded-circle m-4 bg-warning">/</button>
        <button class="border rounded-circle m-lg-2">7</button>
        <button class="border rounded-circle m-4">8</button>
        <button class="border rounded-circle m-4">9</button>
        <button class="border rounded-circle m-lg-2">*</button>
        <button class="border rounded-circle m-4">4</button>
        <button class="border rounded-circle m-4">5</button>
        <button class="border rounded-circle m-4">6</button>
        <button class="border rounded-circle m-4">-</button>
        <button class="border rounded-circle m-lg-2">1</button>
        <button class="border rounded-circle m-4">2</button>
        <button class="border rounded-circle m-4">3</button>
        <button class="border rounded-circle m-4">+</button>
        <button class="border rounded-circle m-4">0</button>
        <button class="border rounded-circle m-4">.</button>
        <button class="border rounded-circle m-4 ">=</button>
       </div>




      </div>
    </div>
