<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />


  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"

  />

  <title>Login & Register</title>

  <style>
    body {
      background-color: skyblue;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      
    }

    .card-box {
      background: aliceblue;
      border-radius: 12px;
      padding: 25px;
      width: 100%;
      max-width: 350px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .form-field {
      border-bottom: 1px solid gray;
      padding-bottom: 5px;
    }

    .form-field input {
      border: none;
      outline: none;
      box-shadow: none !important;
      background: transparent;
    }

    .form-field:focus-within {
      border-bottom: 1px solid skyblue;
    }

    .btn-custom {
      background-color: skyblue;
      color: white;
      border: 1px solid skyblue;
      transition: 0.3s;
    }

    .btn-custom:hover {
      background-color: white;
      color: skyblue;
      border: 1px solid skyblue;
    }

    a {
      text-decoration: none;
      color: skyblue;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="row justify-content-center g-4">

      <!-- Login Card -->
      <div class="col-md-5">
        <div class="card-box">
          <h2><u>Lo</u>gin</h2>

          <div class="form-field d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-envelope"></i>
            <input type="email" class="form-control" placeholder="Enter your email">
          </div>

          <div class="form-field d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-lock-fill"></i>
            <input type="password" class="form-control" placeholder="Confirm a password">
            <i class="bi bi-eye"></i>
          </div>

          <div class="d-flex justify-content-between mb-3 small">
            <div>
              <input type="checkbox">
              <span>Remember Me</span>
            </div>
            <a href="#">Forget password?</a>
          </div>

          <button class="btn btn-custom w-100 mb-3">Login</button>

          <p class="text-center mb-0">
            Don't have an account?
            <a href="#">Signup Now</a>
          </p>
        </div>
      </div>

      <!-- Register Card -->
      <div class="col-md-5">
        <div class="card-box">
          <h2><u>Re</u>gister</h2>

          <div class="form-field d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-person"></i>
            <input type="text" class="form-control" placeholder="Enter your name">
          </div>

          <div class="form-field d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-envelope"></i>
            <input type="email" class="form-control" placeholder="Enter your email">
          </div>

          <div class="form-field d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-lock-fill"></i>
            <input type="password" class="form-control" placeholder="Create a password">
          </div>

          <div class="form-field d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-lock-fill"></i>
            <input type="password" class="form-control" placeholder="Confirm a password">
            <i class="bi bi-eye"></i>
          </div>

          <div class="mb-3 small">
            <input type="checkbox">
            <span>I accept all terms & conditions</span>
          </div>

          <button class="btn btn-custom w-100 mb-3">Register</button>

          <p class="text-center mb-0">
            Already have an account?
            <a href="#">Login Now</a>
          </p>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
